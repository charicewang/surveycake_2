<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究問卷</title>

    <style>
        /* 讓整個畫面置中（電腦＋手機都適用） */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;   /* 水平置中 */
            align-items: center;       /* 垂直置中 */
            min-height: 100vh;         /* 滿版高度 */
        }

        /* 主要內容卡片 */
        .container {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 420px;  /* 電腦版不會太寬 */
            text-align: center;
        }

        h2 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 16px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #357bd8;
        }

        /* 手機微調 */
        @media (max-width: 480px) {
            .container {
                padding: 18px;
                border-radius: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container" id="main">
    <h2>研究參與資格確認</h2>

    <p>請輸入您的年齡：</p>
    <input type="number" id="age" min="0" max="120" placeholder="請輸入年齡">

    <button onclick="startSurvey()">開始作答</button>
</div>

<script>
function startSurvey() {

    const age = parseInt(document.getElementById("age").value);

    if (isNaN(age)) {
        alert("請輸入年齡");
        return;
    }

    if (age < 18) {
        document.getElementById("main").innerHTML = `
            <h2>不符合參與資格</h2>
            <p>本研究僅招募年滿18歲之參與者。</p>
        `;
        return;
    }

    const links = [
        "https://www.surveycake.com/s/z2awX",
        "https://www.surveycake.com/s/42NaQ",
        "https://www.surveycake.com/s/LOmpY",
        "https://www.surveycake.com/s/3XePr"
    ];

    const randomIndex = Math.floor(Math.random() * links.length);

    window.location.href = links[randomIndex];
}
</script>

</body>
</html>
